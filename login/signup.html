<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskBit Sign Up</title>
    <link rel="stylesheet" href="./signup.css" />
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <img
                src="../ccit logo/ccit logo.jpg"
                alt="FAITH Computer Technology Society Logo"
                class="logo"
            />
        </div>

        <div class="right-panel">
            <div class="form-container">
                <h1>Welcome to TaskBit</h1>
                <p class="subtitle">Organize tasks and balance team workload with TaskBit.</p>

                <form id="signupForm">
                    <input
                        type="text"
                        id="full_name"
                        placeholder="Full Name"
                        class="email-input"
                        required
                    />

                    <input
                        type="email"
                        id="email"
                        placeholder="name@firstasia.edu.ph"
                        class="email-input"
                        required
                    />

                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="password"
                            placeholder="Password"
                            class="email-input"
                            required
                        />
                        <button type="button" id="togglePassword" class="toggle-password">Show</button>
                    </div>

                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="confirm_password"
                            placeholder="Confirm Password"
                            class="email-input"
                            required
                        />
                        <button type="button" id="toggleConfirmPassword" class="toggle-password">Show</button>
                    </div>

                    <button type="submit" class="btn continue-btn" id="submitBtn">
                        Sign Up
                    </button>
                </form>

                <p id="message"></p>

                <p class="terms">
                    Already have an account?
                    <a href="login.html">Login</a>
                </p>
            </div>
        </div>
    </div>

    <script src="./signup.js"></script>
</body>
</html>
