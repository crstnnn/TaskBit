<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskBit Login</title>
    <link rel="stylesheet" href="login.css" />
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <img src="../ccit logo/ccit logo.jpg" alt="FAITH Computer Technology Society Logo" class="logo">
        </div>

        <div class="right-panel">
            <div class="form-container">
                <h1>Welcome!</h1>
                <p class="subtitle">Login to continue using TaskBit.</p>

                <form id="loginForm">
                    <input
                        type="email"
                        id="email"
                        placeholder="name@firstasia.edu.ph"
                        class="email-input"
                        required
                    />

                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="password"
                            placeholder="Password"
                            class="email-input"
                            required
                        />
                        <button type="button" id="togglePassword" class="toggle-password">Show</button>
                    </div>

                    <button type="submit" class="btn continue-btn" id="loginBtn">
                        Login
                    </button>
                </form>

                <p id="message"></p>

                <p class="terms">
                    Don't have an account?
                    <a href="signup.html">Sign Up</a>
                </p>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
