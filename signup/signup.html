<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskBit Login</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <img src="../ccit logo/ccit logo.jpg" alt="FAITH Computer Technology Society Logo" class="logo">
        </div>

        <div class="right-panel">
            <div class="form-container">
                <h1>Welcome to TaskBit</h1>
                <p class="subtitle">Organize tasks and balance team workload with TaskBit.</p>

                <button class="btn google-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google logo" class="google-icon">
                    Continue with Google
                </button>

                <div class="divider">
                    <span>Or</span>
                </div>

                <input type="email" placeholder="name@firstasia.edu.ph" class="email-input">
                
                <button class="btn continue-btn">Continue</button>

                <p class="terms">
                    By proceeding, you agree to the<br>
                    <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
