<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management - TaskBit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="tm.css">
    <link rel="stylesheet" href="../navbar/navbar.css"> </head>
<body>

    <div class="app-container">
        
        <div id="navbar-placeholder"></div>

        <main class="main-content">
            <header class="topbar">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search Tasks, Projects...">
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header">
                    <h1 class="page-title">Task Management</h1>
                    <p class="page-subtitle">Manage and track all tasks across your projects</p>
                </div>

                <div class="task-toolbar">
                    <div class="toolbar-search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Search tasks by title or ID..">
                    </div>
                    
                    <div class="toolbar-actions">
                        <div class="filter-dropdown">
                            <select>
                                <option>All Status</option>
                                <option>In Progress</option>
                                <option>Completed</option>
                            </select>
                        </div>
                        <div class="filter-dropdown">
                            <select>
                                <option>All Priority</option>
                                <option>High</option>
                                <option>Medium</option>
                                <option>Low</option>
                            </select>
                        </div>
                        <div class="create-btn-group">
                            <button id="create-task-btn" class="btn-create">Create Task</button>
                            <button class="btn-dropdown"><i class="fa-solid fa-chevron-down"></i></button>
                        </div>
                    </div>
                </div>

                <div class="task-board-container">
                    <h3 class="board-title">All Tasks</h3>
                    
                    <div class="table-wrapper">
                        <table class="task-table">
                            <thead>
                                <tr>
                                    <th>Task Id</th>
                                    <th>Title</th>
                                    <th>Assignee</th>
                                    <th>Status</th>
                                    <th>Priority</th>
                                    <th>Story Points</th>
                                    <th>Due Date</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Task 1</td>
                                    <td class="task-title">Magkamot ng bune</td>
                                    <td>
                                        <div class="assignee">
                                            <i class="fa-regular fa-user"></i>
                                            <span>Cristian Maldia</span>
                                        </div>
                                    </td>
                                    <td><span class="badge status-progress">In Progress</span></td>
                                    <td><span class="badge priority-high">High</span></td>
                                    <td>8</td>
                                    <td class="due-date">
                                        <i class="fa-regular fa-calendar"></i> 4/4/2026
                                    </td>
                                    <td class="action-menu">
                                        <i class="fa-solid fa-ellipsis-vertical"></i>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="create-task-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Task</h2>
                <p>Add a new task to your project. Fill in the details below.</p>
                <button class="modal-close-btn" id="close-modal-btn">&times;</button>
            </div>
            
            <div class="modal-body">
                <form id="create-task-form">
                    <div class="form-row modal-grid-2">
                        <div class="form-group">
                            <label for="task-title">Task Title</label>
                            <input type="text" id="task-title" placeholder="Enter task title" required>
                        </div>
                        <div class="form-group">
                            <label for="task-project">Project</label>
                            <select id="task-project">
                                <option>Select project</option>
                                </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="task-description">Description</label>
                        <textarea id="task-description" placeholder="Describe the task.."></textarea>
                    </div>
                    
                    <div class="form-row modal-grid-3">
                        <div class="form-group">
                            <label for="task-assignee">Assignee</label>
                            <select id="task-assignee">
                                <option>Select member</option>
                                <option>Cristian Maldia</option>
                                <option>Joshua Villarosa</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="task-priority">Priority</label>
                            <select id="task-priority">
                                <option>Priority</option>
                                <option>High</option>
                                <option>Medium</option>
                                <option>Low</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="task-story-points">Story Points</label>
                            <input type="number" id="task-story-points" placeholder="0">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="task-due-date">Due Date</label>
                        <input type="date" id="task-due-date">
                    </div>
                </form>
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn-cancel" id="cancel-modal-btn">Cancel</button>
                <button type="submit" form="create-task-form" class="btn-save">Create Task</button>
            </div>
        </div>
    </div>

    <script src="tm.js"></script>
</body>
</html>
