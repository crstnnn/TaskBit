<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management - TaskBit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="tm.css">
    <link rel="stylesheet" href="../navbar/navbar.css">
</head>
<body>

    <div class="app-container">
        
        <div id="navbar-placeholder"></div>

        <main class="main-content">
            <header class="topbar">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search Tasks, Projects...">
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header">
                    <h1 class="page-title">Task Management</h1>
                    <p class="page-subtitle">Manage and track all tasks across your projects</p>
                </div>

                <div class="task-toolbar">
                    <div class="toolbar-search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Search tasks by title or ID..">
                    </div>
                    
                    <div class="toolbar-actions">
                        <div class="filter-dropdown">
                            <select>
                                <option>All Status</option>
                                <option>In Progress</option>
                                <option>Completed</option>
                            </select>
                        </div>
                        <div class="filter-dropdown">
                            <select>
                                <option>All Priority</option>
                                <option>High</option>
                                <option>Medium</option>
                                <option>Low</option>
                            </select>
                        </div>
                        <div class="create-btn-group">
                            <button class="btn-create">Create Task</button>
                            <button class="btn-dropdown"><i class="fa-solid fa-chevron-down"></i></button>
                        </div>
                    </div>
                </div>

                <div class="task-board-container">
                    <h3 class="board-title">All Tasks</h3>
                    
                    <div class="table-wrapper">
                        <table class="task-table">
                            <thead>
                                <tr>
                                    <th>Task Id</th>
                                    <th>Title</th>
                                    <th>Assignee</th>
                                    <th>Status</th>
                                    <th>Priority</th>
                                    <th>Story Points</th>
                                    <th>Due Date</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Task 1</td>
                                    <td class="task-title">Magkamot ng bune</td>
                                    <td>
                                        <div class="assignee">
                                            <i class="fa-regular fa-user"></i>
                                            <span>Cristian Maldia</span>
                                        </div>
                                    </td>
                                    <td><span class="badge status-progress">In Progress</span></td>
                                    <td><span class="badge priority-high">High</span></td>
                                    <td>8</td>
                                    <td class="due-date">
                                        <i class="fa-regular fa-calendar"></i> 4/4/2026
                                    </td>
                                    <td class="action-menu">
                                        <i class="fa-solid fa-ellipsis-vertical"></i>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="tm.js"></script>
</body>
</html>
